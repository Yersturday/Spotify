<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <style>
      .hieght100 {
        height: 100px;
      }
      .hieght150 {
        height: 150px;
      }
      .hieght300 {
        height: 300px;
      }
      .hieght50 {
        height: 50px;
      }
    </style>
  </head>
  <body>
    <div class="col-12 d-flex">
      <div class="col-4 bg-warning hieght100 border border-secondary"></div>
      <div class="col-4 bg-warning hieght100 border border-secondary">
        <div class="col-12 hieght50 d-flex">
          <div
            class="col-6 bg-warning-subtle hieght50 border border-secondary"
          ></div>
          <div
            class="col-6 bg-warning-subtle hieght50 border border-secondary"
          ></div>
        </div>
        <div class="col-12 hieght50">
          <div class="col-12 bg-info hieght50 border border-secondary"></div>
        </div>
      </div>
      <div class="col-4 bg-warning hieght100 border border-secondary"></div>
    </div>
    <div class="col-12 hieght300 d-flex">
      <div class="col-2 hieght300 bg-primary border border-secondary">
        <div
          class="col-12 hieght100 bg-danger bg-gradient border border-black border-3"
        ></div>
        <div
          class="col-12 hieght100 bg-danger bg-gradient border border-black border-3"
        ></div>
        <div
          class="col-12 hieght100 bg-danger bg-gradient border border-black border-3"
        ></div>
      </div>
      <div class="col-8 hieght300 bg-primary border border-secondary d-flex">
        <div
          class="col-2 hieght300 bg-danger-subtle border border-secondary"
        ></div>
        <div class="col-8 hieght300 bg-danger-subtle border border-secondary">
          <div class="d-flex">
            <div
              class="col-4 hieght150 bg-primary-subtle border border-secondary"
            ></div>
            <div
              class="col-8 hieght150 bg-primary-subtle border border-secondary"
            ></div>
          </div>
          <div class="d-flex">
            <div
              class="col-8 hieght150 bg-primary-subtle border border-secondary d-flex"
            >
              <div
                class="col-4 hieght150 bg-danger border border-secondary"
              ></div>
              <div
                class="col-4 hieght150 bg-danger border border-secondary"
              ></div>
              <div
                class="col-4 hieght150 bg-danger border border-secondary"
              ></div>
            </div>
            <div
              class="col-4 hieght150 bg-primary-subtle border border-secondary"
            ></div>
          </div>
        </div>
        <div
          class="col-2 hieght300 bg-danger-subtle border border-secondary d-flex"
        >
          <div
            class="col-6 hieght300 bg-warning border border-black border-3"
          ></div>
          <div
            class="col-6 hieght300 bg-warning border border-black border-3"
          ></div>
        </div>
      </div>
      <div class="col-2 hieght300 bg-primary border border-secondary"></div>
    </div>
  </body>
</html>
